name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # License compliance — REUSE spec + cargo-deny over the Rust workspace.
  # The workspace-internal SPDX field check runs in the test job
  # (`bun run license:check`); this job covers REUSE-spec headers and
  # the Rust dependency graph.
  license:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # Graphviz upstream is intentionally not pulled

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reuse
        run: pipx install reuse

      - name: REUSE lint
        run: reuse lint
        continue-on-error: true  # warn-only until per-file SPDX headers land

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny check
        run: cargo deny check

  # Fast (syntactic) ESLint over the whole repo plus the feature linter.
  # The type-aware pass runs in the test job after the build.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: ESLint + feature linter
        run: bun run lint

  # Code quality checks and tests
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --no-progress

      - name: License compliance (workspace SPDX)
        run: bun run license:check

      - name: Setup Rust toolchain (for wasm builds)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build in-tree wasm packages
        run: bun run build:wasm

      - name: Run core tests (coverage)
        run: bun run test:core -- --coverage

      - name: Run workspace tests (features / renderers / engines)
        run: bun run --filter '@supramark/feature-*' --filter '@supramark/rn' --filter '@supramark/engines' --if-present test

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage/coverage-final.json
          flags: core
          name: core-coverage
          fail_ci_if_error: false

      - name: React Native package tests (native-module resolution)
        run: |
          for pkg in graphviz-anywhere d2-little mermaid-little plantuml-little; do
            echo "::group::$pkg resolve-native"
            (cd "crates/$pkg/packages/react-native" && bun test)
            echo "::endgroup::"
          done

      - name: Build packages
        run: bun run build

      - name: Type-aware lint
        # Runs after the build so the per-package type checker resolves the
        # same project graph as the build. Single matrix entry is enough.
        if: matrix.node-version == '20.x'
        run: bun run lint:types

      - name: Quality check
        if: matrix.node-version == '20.x'
        run: bun run quality

  # Host-side native bridge tests (JNI string/handle marshalling) — run on a
  # host JVM with no Android NDK, emulator or gradle. Only d2 and mermaid run
  # here: their cargo crates are self-contained. graphviz-anywhere and plantuml
  # are excluded — graphviz's host static lib must be built from Graphviz source
  # (slow), and plantuml-native transitively depends on the graphviz-anywhere
  # crate (PlantUML embeds dot), whose build.rs needs a prebuilt graphviz lib
  # not present on a clean CI runner. Their JNI host tests and the iOS XCTest
  # stubs (which need a macOS runner) run out-of-band via the scripts under
  # packages/react-native.
  native-host-tests:
    name: Native host tests (JNI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run JNI host bridge tests
        run: |
          for pkg in d2-little mermaid-little; do
            echo "::group::$pkg JNI host test"
            crates/$pkg/packages/react-native/scripts/test-android-jni.sh
            echo "::endgroup::"
          done

  # plantuml-little Rust unit tests (parser / layout / render). Issue #46:
  # these never ran in CI because building the crate pulls graphviz-anywhere's
  # build.rs, which needs a prebuilt libgraphviz_api. There is no published
  # release asset, so we build the static lib from the vendored Graphviz
  # submodule once (cached) and run `cargo test --lib`.
  #
  # The Java-shelling byte-exact reference-SVG suite (tests/*.rs, behind
  # `--features metrics-ttf-parser`) is intentionally NOT run here — that
  # heavier tier is tracked as a separate follow-up. `--lib` scopes to the
  # src/ unit tests, which need the crate to link but not Java.
  plantuml-tests:
    name: plantuml-little Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # graphviz submodule fetched only on cache miss

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install graphviz build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex

      # Cache key busts exactly when the pinned graphviz version or the build
      # script changes; otherwise the prebuilt static lib is reused.
      - name: Resolve graphviz submodule SHA (cache key)
        id: gvsha
        run: |
          sha=$(git ls-tree HEAD crates/graphviz-anywhere/graphviz | awk '{print $3}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Restore cached libgraphviz_api
        id: cache
        uses: actions/cache@v4
        with:
          path: crates/graphviz-anywhere/output/linux-x86_64
          key: graphviz-linux-x86_64-${{ steps.gvsha.outputs.sha }}-${{ hashFiles('crates/graphviz-anywhere/scripts/build-linux.sh', 'crates/graphviz-anywhere/scripts/common.sh') }}

      # On cache miss only: shallow-fetch the GitLab graphviz submodule and
      # build the unified static library. On hit this step is skipped.
      - name: Build libgraphviz_api from submodule (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 crates/graphviz-anywhere/graphviz
          bash crates/graphviz-anywhere/scripts/build-linux.sh

      # graphviz-anywhere's build.rs statically links
      # output/linux-x86_64/lib/libgraphviz_api.a via try_repo_output(), so no
      # GRAPHVIZ_* env var or LD_LIBRARY_PATH is needed.
      - name: cargo test -p plantuml-little --lib
        run: cargo test -p plantuml-little --lib -- --nocapture

  # plantuml-little byte-exact reference-SVG suite (issue #46, "Full" tier).
  # The committed goldens in tests/reference/ are byte-exact against the wasm
  # Graphviz build (@kookyleo/graphviz-anywhere-web@0.1.8), so the suite runs
  # with PLANTUML_LITTLE_TEST_BACKEND=wasm for cross-platform determinism.
  # scripts/check_reference_failures.sh runs `cargo test --test reference_tests`
  # and requires the failing set to equal tests/known_failures.txt EXACTLY —
  # bidirectional drift detection. This makes the job gating-green today (the
  # ~50 known failures are the open render bugs) while catching every NEW
  # regression or unexpectedly-healed fixture. No Java is needed (unlike the
  # special_ext_reference_* suites, which are out of scope here).
  plantuml-reference:
    name: plantuml-little reference-SVG suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # graphviz submodule fetched only on cache miss

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install graphviz build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex

      - name: Resolve graphviz submodule SHA (cache key)
        id: gvsha
        run: |
          sha=$(git ls-tree HEAD crates/graphviz-anywhere/graphviz | awk '{print $3}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Restore cached libgraphviz_api
        id: cache
        uses: actions/cache@v4
        with:
          path: crates/graphviz-anywhere/output/linux-x86_64
          key: graphviz-linux-x86_64-${{ steps.gvsha.outputs.sha }}-${{ hashFiles('crates/graphviz-anywhere/scripts/build-linux.sh', 'crates/graphviz-anywhere/scripts/common.sh') }}

      - name: Build libgraphviz_api from submodule (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 crates/graphviz-anywhere/graphviz
          bash crates/graphviz-anywhere/scripts/build-linux.sh

      # The wasm dot backend needs Node 22+ (README) and the published
      # @kookyleo/graphviz-anywhere-web@0.1.8 npm tarball.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache wasm-backend node_modules
        uses: actions/cache@v4
        with:
          path: crates/plantuml-little/tests/support/node_modules
          key: plantuml-wasm-backend-${{ hashFiles('crates/plantuml-little/tests/support/package-lock.json', 'crates/plantuml-little/tests/support/package.json') }}

      - name: Install wasm dot backend
        run: npm install
        working-directory: crates/plantuml-little/tests/support

      # check_reference_failures.sh runs `cargo test --test reference_tests`
      # and diffs the failing set against tests/known_failures.txt. The wasm
      # backend is opted in via the env var; the native libgraphviz_api is
      # statically linked at build time (no LD_LIBRARY_PATH needed).
      - name: Run reference-SVG suite (xfail vs known_failures.txt)
        env:
          PLANTUML_LITTLE_TEST_BACKEND: wasm
        run: bash crates/plantuml-little/scripts/check_reference_failures.sh


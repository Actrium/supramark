<svg id="ref-ext-fixtures-demos-pie-01" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 547.5263671875 450" style="max-width: 547.5263671875px;" role="graphics-document document" aria-roledescription="pie" aria-describedby="chart-desc-ref-ext-fixtures-demos-pie-01" aria-labelledby="chart-title-ref-ext-fixtures-demos-pie-01"><title id="chart-title-ref-ext-fixtures-demos-pie-01">simple pie char demo</title><desc id="chart-desc-ref-ext-fixtures-demos-pie-01">pie chart with 3 sections: dogs, cats, rats. Most are dogs.</desc><style>#ref-ext-fixtures-demos-pie-01{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#ref-ext-fixtures-demos-pie-01 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#ref-ext-fixtures-demos-pie-01 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#ref-ext-fixtures-demos-pie-01 .error-icon{fill:#552222;}#ref-ext-fixtures-demos-pie-01 .error-text{fill:#552222;stroke:#552222;}#ref-ext-fixtures-demos-pie-01 .edge-thickness-normal{stroke-width:1px;}#ref-ext-fixtures-demos-pie-01 .edge-thickness-thick{stroke-width:3.5px;}#ref-ext-fixtures-demos-pie-01 .edge-pattern-solid{stroke-dasharray:0;}#ref-ext-fixtures-demos-pie-01 .edge-thickness-invisible{stroke-width:0;fill:none;}#ref-ext-fixtures-demos-pie-01 .edge-pattern-dashed{stroke-dasharray:3;}#ref-ext-fixtures-demos-pie-01 .edge-pattern-dotted{stroke-dasharray:2;}#ref-ext-fixtures-demos-pie-01 .marker{fill:#333333;stroke:#333333;}#ref-ext-fixtures-demos-pie-01 .marker.cross{stroke:#333333;}#ref-ext-fixtures-demos-pie-01 svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#ref-ext-fixtures-demos-pie-01 p{margin:0;}#ref-ext-fixtures-demos-pie-01 .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#ref-ext-fixtures-demos-pie-01 .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#ref-ext-fixtures-demos-pie-01 .pieTitleText{text-anchor:middle;font-size:25px;fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;}#ref-ext-fixtures-demos-pie-01 .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;font-size:17px;}#ref-ext-fixtures-demos-pie-01 .legend text{fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#ref-ext-fixtures-demos-pie-01 .node .neo-node{stroke:#9370DB;}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node rect,#ref-ext-fixtures-demos-pie-01 [data-look="neo"].cluster rect,#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].node circle .state-start{fill:#000000;}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#ref-ext-fixtures-demos-pie-01 [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#ref-ext-fixtures-demos-pie-01 :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,1,1,-177.899,-50.763L0,0Z" fill="#ECECFF" class="pieCircle"></path><path d="M-177.899,-50.763A185,185,0,0,1,-35.652,-181.532L0,0Z" fill="#ffffde" class=
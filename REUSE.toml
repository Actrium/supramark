version = 1

# REUSE specification: https://reuse.software/spec/
#
# This file declares default SPDX metadata for files where adding an inline
# header is impractical (generated artifacts, vendored binaries, JSON/lockfiles,
# wasm blobs). Source files SHOULD still carry SPDX-FileCopyrightText /
# SPDX-License-Identifier headers — these annotations are the fallback only.
#
# Sub-trees with their own upstream license (crates/* after the subtree
# merges in step 2) MUST add their own [[annotations]] block, with paths
# scoped to that sub-tree, declaring the upstream-aligned SPDX identifier.
# See docs/architecture/LICENSE_COMPATIBILITY.md for the policy.

# ── Repository-wide default ────────────────────────────────────────────
# All first-party @supramark/* code is Apache-2.0. New files inherit this
# unless overridden by a more specific [[annotations]] block below.
[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Supramark contributors"
SPDX-License-Identifier = "Apache-2.0"

# ── Configuration / metadata files ─────────────────────────────────────
# These are typically too short or too structural to embed SPDX headers.
[[annotations]]
path = [
    "**/package.json",
    "**/tsconfig.json",
    "**/tsconfig.*.json",
    "pnpm-workspace.yaml",
    "bunfig.toml",
    "**/.gitignore",
    "**/jest.preset.cjs",
    "jest-environment.cjs",
    "**/.eslintrc*",
    "**/.prettierrc*",
    "REUSE.toml",
    "deny.toml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Supramark contributors"
SPDX-License-Identifier = "Apache-2.0"

# ── Lockfiles (auto-generated, no header possible) ─────────────────────
[[annotations]]
path = ["pnpm-lock.yaml", "bun.lock", "**/Cargo.lock"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# ── Documentation ──────────────────────────────────────────────────────
[[annotations]]
path = ["docs/**", "README.md", "CLAUDE.md", "**/README.md"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Supramark contributors"
SPDX-License-Identifier = "Apache-2.0"

# ── Examples (treated as user-facing samples; same as repo default) ────
[[annotations]]
path = "examples/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Supramark contributors"
SPDX-License-Identifier = "Apache-2.0"

# ── crates/dagre — subtree-merged from kookyleo/dagre-rs ───────────────
# Apache-2.0 wrapper; reimplementation of dagre.js (MIT). See
# crates/dagre/UPSTREAM.md.
[[annotations]]
path = "crates/dagre/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# ── crates/supramark-markdown parser core — derived from markdown-it-rust ───
# Upstream-derived parser core files remain MIT-licensed. Supramark AST v2
# output files in the same crate inherit the repository Apache-2.0 default.
[[annotations]]
path = [
    "crates/supramark-markdown/LICENSE",
    "crates/supramark-markdown/src/common/**",
    "crates/supramark-markdown/src/generics/**",
    "crates/supramark-markdown/src/parser/**",
    "crates/supramark-markdown/src/plugins/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Alex Kocharin and markdown-it contributors"
SPDX-License-Identifier = "MIT"

# Cross-validation reference data — generated from upstream dagre.js
# fixtures. Treat as data (not source). dagre.js is MIT.
[[annotations]]
path = "crates/dagre/cross-validate/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "dagre.js contributors (cross-validation data)"
SPDX-License-Identifier = "MIT"

# ── crates/graphviz-anywhere — subtree-merged from kookyleo/graphviz-anywhere ──
# Wrapper code is Apache-2.0. The Graphviz C library being wrapped is
# EPL-1.0 — see crates/graphviz-anywhere/UPSTREAM.md for boundary rules.
[[annotations]]
path = "crates/graphviz-anywhere/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# Upstream Graphviz source (registered as a git submodule, currently
# empty). When populated, every file under here belongs to the upstream
# Graphviz project and carries EPL-1.0 / CPL-1.0.
[[annotations]]
path = "crates/graphviz-anywhere/graphviz/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Graphviz contributors"
SPDX-License-Identifier = "EPL-1.0"

# Built Graphviz binaries dropped here by the Rust crate's build.rs.
# They are derivative works of upstream Graphviz → EPL-1.0.
[[annotations]]
path = "crates/graphviz-anywhere/packages/rust/prebuilt/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Graphviz contributors"
SPDX-License-Identifier = "EPL-1.0"

# Pre-built wasm bundle (Graphviz compiled to wasm + JS glue produced by
# Emscripten). Contains both EPL-1.0 derivative code (compiled Graphviz)
# and Apache-2.0 JS glue from upstream graphviz-anywhere — treated as
# the more restrictive EPL-1.0 for the bundle as a whole.
[[annotations]]
path = "crates/graphviz-anywhere/packages/web/dist/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Graphviz contributors and graphviz-anywhere contributors"
SPDX-License-Identifier = "EPL-1.0"

# Build noise that should not gate compliance.
[[annotations]]
path = "crates/graphviz-anywhere/wasm-build.log"
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# ── crates/font-metrics — first-party shared-dep extraction ────────────
# First-party Metrics trait with TtfParser and HostCallback
# implementations shared by plantuml-little, mermaid-little and
# d2-little. Originally extracted on 2026-05-09 to share a single
# source of truth across the *-little family. Two cleanup passes on
# 2026-05-10 collapsed the impl set to its current shape: (1) the
# offline-baked DejaVu range tables (~22K LOC of static data, formerly
# under src/static_dejavu/) were deleted after a wrapper named
# TtfParserJavaCompatMetrics was shown to reproduce them from the
# embedded DejaVu Latin subset alone; (2) a follow-up measurement spike
# then showed the wrapper's italic-skew adjustment was based on a wrong
# Java AWT assumption and over-corrected widths, while raw
# TtfParserMetrics::default_latin() already matches Java FontMetrics
# byte-for-byte on the discriminating italic test (delta = 0.000042 px),
# so the wrapper itself was deleted as well.
#
# Code (Cargo.toml, src/**/*.rs): Apache-2.0 OR MIT (Rust-ecosystem
# dual licence; matches the rest of supramark's first-party crates).
# Embedded DejaVu Latin subsets: see the crates/font-metrics/assets/**
# block below for the Bitstream-Vera attribution.
[[annotations]]
path = "crates/font-metrics/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "Apache-2.0 OR MIT"

# Embedded DejaVu Latin subsets (Sans / Mono x Regular / Bold / Italic /
# Bold-Italic), generated offline with pyftsubset against the upstream
# Bitstream-Vera-licensed DejaVu fonts. Bundled by
# TtfParserMetrics::default_latin() as both the zero-config production
# fallback and the byte-equal-Java regression-test fixture for the
# *-little family. See https://dejavu-fonts.github.io/License.html for
# the canonical licence text and LICENSES/Bitstream-Vera.txt for the
# repo-local stub.
[[annotations]]
path = "crates/font-metrics/assets/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Bitstream Inc. and DejaVu fonts contributors"
SPDX-License-Identifier = "Bitstream-Vera"

# ── crates/plantuml-little — subtree-merged from kookyleo/plantuml-little ──
# Upstream declares a 5-way OR licence:
#   GPL-3.0-or-later OR LGPL-3.0-or-later OR Apache-2.0 OR EPL-2.0 OR MIT
# REUSE annotations record the upstream SPDX expression verbatim;
# downstream consumers (including supramark) pick a single option.
[[annotations]]
path = "crates/plantuml-little/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later OR LGPL-3.0-or-later OR Apache-2.0 OR EPL-2.0 OR MIT"

# Vendored stdlib (sprites, includes) — may carry upstream-PlantUML
# attribution. Treated as multi-license like the rest of plantuml-little
# until per-file headers say otherwise.
[[annotations]]
path = "crates/plantuml-little/stdlib/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com> (vendored from PlantUML where applicable)"
SPDX-License-Identifier = "GPL-3.0-or-later OR LGPL-3.0-or-later OR Apache-2.0 OR EPL-2.0 OR MIT"

# ── crates/d2-little — subtree-merged from kookyleo/d2-little ──────────
# MPL-2.0 throughout; ttf font files have per-file licenses (handled by
# their own headers). Reference test data inherits terrastruct/d2 attr.
[[annotations]]
path = "crates/d2-little/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "MPL-2.0"

[[annotations]]
path = "crates/d2-little/tests/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com> and terrastruct/d2 contributors (reference data)"
SPDX-License-Identifier = "MPL-2.0"

# Bundled font files — each .ttf has its own embedded licence. Mark as
# license-needs-per-file-review so REUSE doesn't fail; revisit when
# auditing fonts.
[[annotations]]
path = "crates/d2-little/ttf/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Various font foundries — see per-file metadata"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["crates/d2-little/mathjax.js", "crates/d2-little/setup.js", "crates/d2-little/run_e2e.sh", "crates/d2-little/SVG_E2E_MIGRATION_CHECKLIST.md"]
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "MPL-2.0"

# ── crates/mermaid-little — subtree-merged from kookyleo/mermaid-little ──
# MIT throughout. The packages/web/ subdirectory is a supramark-side
# downstream patch (see crates/mermaid-little/UPSTREAM.md); it carries
# the same MIT licence as the rest of the sub-tree.
[[annotations]]
path = "crates/mermaid-little/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "MIT"

# Vendored dagre-d3-es tarball — used only as a parity reference, not
# as a runtime dep. Upstream dagre-d3-es is MIT.
[[annotations]]
path = "crates/mermaid-little/dagre-d3-es-7.0.14.tgz"
precedence = "aggregate"
SPDX-FileCopyrightText = "dagre-d3-es contributors"
SPDX-License-Identifier = "MIT"

# ── crates/vison — subtree-merged from kookyleo/vison ──────────────────
# MIT throughout. Includes vison-core (Rust) + vison-renderers
# (TypeScript Web/RN). The supramark side adds a LICENSE file +
# Cargo.toml metadata + per-renderer package.json — all under the same
# MIT licence; tracked for upstream contribution in
# crates/vison/UPSTREAM.md.
[[annotations]]
path = "crates/vison/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "kookyleo <kookyleo@gmail.com>"
SPDX-License-Identifier = "MIT"

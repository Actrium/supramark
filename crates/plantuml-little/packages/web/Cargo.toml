[package]
name = "plantuml-little-web"
version = "1.2026.2-3"
edition = "2021"
rust-version = "1.82"
license = "GPL-3.0-or-later OR LGPL-3.0-or-later OR Apache-2.0 OR EPL-2.0 OR MIT"
authors = ["kookyleo <kookyleo@gmail.com>"]
description = "wasm-bindgen wrapper for plantuml-little — run PlantUML → SVG in the browser"
homepage = "https://github.com/Actrium/plantuml-little"
repository = "https://github.com/Actrium/plantuml-little"
keywords = ["plantuml", "puml", "svg", "wasm", "web"]
categories = ["wasm", "graphics"]
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

# wasm-opt default args don't include --enable-bulk-memory, but rustc now
# emits memory.copy / memory.fill instructions for wasm32 (since Rust
# 1.82 raised the baseline feature set). Pass both feature flags through
# to wasm-opt so optimisation doesn't reject the input.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[dependencies]
# Depend on the root crate as a library with the CLI + ureq-backed remote
# fetch features disabled — wasm32 has no stdio, no TCP, no filesystem in
# the usual sense. graphviz-anywhere installs its own wasm JS bridge
# automatically when compiled for wasm32.
#
# The parent crate's default feature set excludes ALL `metrics-*`
# impls (the family is mutually exclusive and the choice is too
# load-bearing to be implicit), so production wasm explicitly selects
# `metrics-host-callback` here. This is the canonical pattern for
# downstream consumers: `default-features = false` plus one platform
# impl. The host-callback impl defers every text measurement to
# `globalThis.supramark.measureText`, which the host installs before
# the wasm runs. This keeps Layer-1 layout consistent with the host's
# actual font rendering. The sibling `metrics-ttf-parser` impl
# (also the byte-equal-Java path used by the native test suite) embeds
# a ~130 KB DejaVu Latin subset; staying on `metrics-host-callback`
# here keeps that subset out of the wasm bundle. The host can install
# the default canvas-backed bridge
# via `installHostMetricsBridge()` from
# `@supramark/engines/host-bridge`, or supply its own
# `globalThis.supramark.measureText` first.
#
# The future React-Native FFI wrapper will use the sibling
# `metrics-ffi-callback` feature (currently a stub that fires a
# `compile_error!` until the impl lands).
plantuml-little = { path = "../..", default-features = false, features = ["metrics-host-callback"] }
wasm-bindgen = "0.2"

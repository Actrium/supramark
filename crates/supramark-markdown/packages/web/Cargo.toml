[package]
name = "supramark-markdown-web"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0 AND MIT"
description = "wasm-bindgen wrapper for supramark-markdown AST v2 parsing"
repository = "https://github.com/kookyleo/supramark"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[dependencies]
supramark-markdown = { path = "../.." }
serde_json = "1"
wasm-bindgen = "0.2"

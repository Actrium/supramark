// Android library wrapper for supramark-mermaid-native.
//
// CMake builds a tiny JNI shim (supramark_d2_jni.c) that statically
// links the cargo-produced libsupramark_mermaid_native.{so} (from
// src/main/jniLibs/<abi>/, populated by scripts/prepare-native.js).
//
// Host integrators must include `libc++_shared.so` in their APK —
// the supramark-mermaid-native staticlib is built against the NDK with
// ANDROID_STL=c++_shared. RN >= 0.71 bundles this automatically;
// standalone Android apps may need to add `packagingOptions` to
// include it. See README.

buildscript {
    def kotlinVersion = rootProject.ext.has("kotlinVersion")
            ? rootProject.ext.get("kotlinVersion")
            : "1.9.25"

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

// Honor the app-level `reactNativeArchitectures` gradle property so a
// single-ABI app build only configures the ABIs it actually wants, instead
// of always demanding a staged .so for every listed ABI (an unstaged ABI
// would otherwise fail at CMake configure). Falls back to the ABIs that
// scripts/prepare-native.js stages into jniLibs/.
def nativeArchitectures(defaults) {
    def value = rootProject.findProperty("reactNativeArchitectures")
    return value ? value.split(",").collect { it.trim() }.findAll { it } : defaults
}

apply plugin: "com.android.library"
apply plugin: "com.facebook.react"

android {
    namespace "com.supramark.mermaidnative"
    compileSdkVersion safeExtGet("compileSdkVersion", 35)

    defaultConfig {
        minSdkVersion safeExtGet("minSdkVersion", 24)
        targetSdkVersion safeExtGet("targetSdkVersion", 35)

        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters.addAll(nativeArchitectures(["arm64-v8a", "x86_64"]))
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/CMakeLists.txt"
            version "3.22.1"
        }
    }

    // jniLibs/ is populated by scripts/prepare-native.js with the
    // cargo-built libsupramark_mermaid_native.so per ABI; CMake's IMPORTED
    // target points at that location.
    sourceSets {
        main {
            java.srcDirs = ["src/main/java"]
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-android:+"
}
